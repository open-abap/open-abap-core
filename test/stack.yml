services:
  postgresql:
    image: postgres:17
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 20s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
  httpbin:
    image: kennethreitz/httpbin
    container_name: httpbin
    ports:
      - '8080:80'
  oauth2:
    image: node:22-alpine
    container_name: oauth2
    command: ["node", "/app/oauth2-server.mjs"]
    volumes:
      - ./oauth2/oauth2-server.mjs:/app/oauth2-server.mjs:ro
    ports:
      - '8081:8081'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8081/health').then(response => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 1s
      timeout: 2s
      retries: 10
